name: EMA Scanner

on:
  schedule:
    - cron: "*/5 * * * *"    # Kept as a backup
  workflow_dispatch:          # Allows you to run it manually via the button
  repository_dispatch:        # This listens to the 5-minute external cron-job.org ping
    types: [trigger-ema]

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python ema_realtime.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
